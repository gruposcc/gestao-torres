

{% if results %}
{% for item in results  %}
<li class="item "
@mousedown.prevent="selectTorre( '{{ item.id }}', '{{ item.name }}', '{{ item.altura }}')"

>
    <div class="container">
        <span >{{ item.name }}</span>
        <span class="text-gray-400">alt: {{ item.altura }}m</span>
        <span class="text-gray-400">lat: {{ item.lat }}</span>
        <span class="text-gray-400">lng: {{ item.lng }}</span>
    </div>
</li>
{% endfor %}
{% else %}
{# ERROR #}
<li class="item p-1.5"
@mousedown.prevent="searchQuery = ''"
>
    <div class="container">
        Nenhum resultado
    </div>
</li>
{% endif %}
