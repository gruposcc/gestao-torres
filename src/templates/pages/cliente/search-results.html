

{% if results %}
{% for item in results  %}
<li class="item "
@mousedown.stop="selectCliente( '{{ item.id }}', '{{ item.name }}')"

>
    <div class="container">
        <span >{{ item.name }}</span>
        {# <span class="text-gray-400">lat: {{ item.lat }}</span>
        <span class="text-gray-400">lng: {{ item.lng }}</span> #}
    </div>
</li>
{% endfor %}
{% else %}
{# ERROR #}
<li class="item p-1.5"
@mousedown.stop="searchQuery = ''"
>
    <div class="container">
        Nenhum resultado
    </div>
</li>
{% endif %}
