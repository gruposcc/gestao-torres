

{% if results %}
{% for item in results  %}
<li class="item "
@mousedown.prevent="selectCliente( '{{ item.id }}', '{{ item.name }}')"

>
    <div class="container">
        <span >{{ item.name }}</span>
    </div>
</li>
{% endfor %}
{% else %}
{# ERROR #}
<li class="item p-1.5"
@mousedown.prevent="searchQuery = ''"
>
    <div class="container">
        Nenhum resultado
    </div>
</li>
{% endif %}
