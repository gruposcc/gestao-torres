        {# coluna da direta #}
        <div class="gap-4 w-full h-full">
                <div class="sticky top-6 bg-surface-alt dark:bg-surface-dark-alt/20 transition-all duration-200 ease-in-out border-2 border-dashed border-outline rounded-radius p-6">

        <div class="flex items-center gap-3 mb-8">
            <div class="p-2 bg-primary/10 rounded-lg text-primary">
                <i data-lucide="eye" class="w-5 h-5"></i>
            </div>
            <h3 class="text-primary font-bold uppercase tracking-wider text-sm">Preview da Despesa</h3>
        </div>

        <div class="space-y-6">
            <div class="pb-3 border-b border-outline">
                <span class="text-[10px] uppercase font-black text-on-surface/50">Identificação</span>
                <p class="text-lg font-bold text-gray-800 dark:text-gray-100 break-words mt-1 leading-tight"
                   x-text="name || 'Nome da despesa...'"></p>
            </div>

            <div class="pb-3 border-b border-outline">
            <span class="text-[10px] uppercase font-black text-on-surface/50">Investimento Total Previsto</span>
            <div class="flex items-baseline gap-1 mt-1">
                <span class="text-sm font-bold text-primary">R$</span>
                <span class="text-4xl font-black text-primary tracking-tighter"
                    x-text="calculos.total.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2})">
                </span>
            </div>
            <template x-if="calculos.parcelas > 1">
                <p class="text-xs text-on-surface/60 mt-1">
                    Sendo <strong x-text="calculos.parcelas"></strong> parcelas de
                    <strong x-text="'R$ ' + parseFloat(valor).toLocaleString('pt-BR', {minimumFractionDigits: 2})"></strong>
                </p>
            </template>
        </div>

        <div class="space-y-4">
            <div class="flex items-center gap-4">
                <div class="w-8 h-8 flex items-center justify-center rounded-full bg-surface/50 dark:bg-surface-dark/30 text-gray-400">
                    <i data-lucide="building-2" class="w-4 h-4"></i>
                </div>
                <div>
                    <span class="block text-[10px] uppercase font-bold text-on-surface/50 leading-none">Vínculo</span>
                    <span class="text-sm font-semibold text-gray-600 dark:text-gray-300">Torre {{ torre.name }}</span>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div class="w-8 h-8 flex items-center justify-center rounded-full bg-surface/50 dark:bg-surface-dark/30 text-gray-400">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                </div>
                <div>
                    <span class="block text-[10px] uppercase font-bold text-on-surface/50 leading-none">Ciclo de Cobrança</span>
                    <span class="text-sm font-semibold text-gray-600 dark:text-gray-300"
                            x-text="recorrenciaText || 'Não selecionada'"></span>
                </div>
            </div>
                <div class="flex items-center gap-4">
                    <div class="w-8 h-8 flex items-center justify-center rounded-full bg-surface/50 dark:bg-surface-dark/30 text-gray-400">
                        <i data-lucide="calendar-days" class="w-4 h-4"></i>
                    </div>
                    <div>
                        <span class="block text-[10px] uppercase font-bold text-on-surface/50 leading-none"
                            x-text="recorrencia.toUpperCase() === 'ÚNICA' ? 'Vencimento' : 'Primeiro Vencimento'"></span>
                        <span class="text-sm font-semibold text-gray-600 dark:text-gray-300"
                            x-text="formatDate(dataInicio)"></span>
                    </div>
                </div>

                <div class="flex items-center gap-4" x-show="recorrencia !== 'Única' && recorrencia !== ''" x-transition>
                    <div class="w-8 h-8 flex items-center justify-center rounded-full bg-surface/50 dark:bg-surface-dark/30 text-gray-400">
                        <i data-lucide="calendar-off" class="w-4 h-4"></i>
                    </div>
                    <div>
                        <span class="block text-[10px] uppercase font-bold text-on-surface/50 leading-none">Encerramento</span>
                        <span class="text-sm font-semibold text-gray-600 dark:text-gray-300"
                            x-text="dataFinal ? formatDate(dataFinal) : 'Contínuo / Sem fim'"></span>
                    </div>
                </div>
            </div>
        </div>

        <div
         x-show="recorrencia !== 'Única' && recorrencia !== ''"
         class="mt-8 p-4 bg-blue-50/50 dark:bg-blue-900/10 rounded-radius border border-blue-100 dark:border-blue-800/30">
            <div class="flex gap-2">
                <i data-lucide="info" class="w-4 h-4 text-blue-500 shrink-0"></i>
                <p class="text-[11px] text-blue-700 dark:text-blue-400 leading-normal italic">
                    Este contrato afetará o fluxo de caixa da <strong>{{ torre.name }}</strong> recorrentemente após a data inicial.
                </p>
            </div>
        </div>
    </div>


    </div>
