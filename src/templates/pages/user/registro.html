{% extends "base.html" %}

{% block body %}
<div class="relative flex w-full flex-col md:flex-row">
    <div class="h-svh w-full overflow-y-auto p-4 bg-surface dark:bg-surface-dark">
        <div class="flex items-center justify-center overflow-hidden w-full h-full rounded-radius">
            
            {# CARD - Mantendo sua estrutura de card #}
            <div 
                class="x-cloak w-full max-w-4xl 
                    rounded-radius
                    border border-outline dark:border-outline-dark
                    bg-surface-alt dark:bg-surface-dark-alt
                    text-on-surface dark:text-on-surface-dark 
                    shadow-xl overflow-hidden relative
                    ">
                
                <div class="absolute top-3 right-3 z-10">
                    <button @click="$store.theme.toggle()" type="button"
                        class="w-10 h-10 p-2 rounded-full text-on-surface hover:bg-outline/20 dark:text-on-surface-dark dark:hover:bg-outline-dark/50 transition duration-150 relative">
                        <i data-lucide="sun" class="size-5 absolute inset-0 m-auto" x-show="!$store.theme.darkMode" aria-label="Switch to Dark Mode"></i>
                        <i data-lucide="moon" class="size-5 absolute inset-0 m-auto" x-show="$store.theme.darkMode" aria-label="Switch to Light Mode"></i>
                    </button>
                </div>

                <div class="md:grid md:grid-cols-2">
                    
                    <div class="hidden md:block bg-surface-alt relative overflow-hidden p-8 border-r border-outline dark:border-outline-dark">
                        <div class="flex flex-col justify-center items-center h-full w-full">
                            <img src="/static/img/logo_torres.png" alt="Logo Torres SCC"
                                class="object-contain max-h-full max-w-full p-4 md:p-12 z-10 relative opacity-90 dark:opacity-100" 
                                loading="lazy">
                            <div class="absolute inset-0 bg-primary-container/30 dark:bg-primary-dark-container/30"></div>
                        </div>
                    </div>

                    <div class="flex flex-col">
                        
                        <header class="border-b border-outline dark:border-outline-dark px-6 py-6 flex items-center justify-center md:py-8">
                            <h1 class="text-2xl font-semibold tracking-wide text-on-surface-strong dark:text-on-surface-dark-strong">
                                Novo Cadastro de Usuário
                            </h1>
                        </header>
                        
                        <div class="p-6 md:p-10 flex flex-col grow overflow-y-auto">
                            {% block register_form %}
                            <form
                                hx-post="/user/create"
                                hx-swap="outerHTML"
                                class="flex flex-col items-center justify-start px-4 md:px-12 py-2 w-full h-full grow space-y-4"
                            >
                                
                                <div class="w-full flex flex-col gap-1 text-on-surface dark:text-on-surface-dark">
                                    <label for="username-input" class="w-fit pl-0.5 text-sm text-on-surface-strong dark:text-on-surface-dark-strong">
                                        Nome de Usuário (Username) <span class="text-danger">*</span>
                                    </label>
                                    
                                    <input 
                                        id="username-input"
                                        type="text" 
                                        name="username" 
                                        placeholder="Ex: bernardo" 
                                        class="w-full rounded-radius border px-3 py-2 text-base 
                                               bg-surface-alt dark:bg-surface-dark-alt/50 border-outline dark:border-outline-dark
                                               focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary dark:focus-visible:outline-primary-dark"
                                        required
                                        minlength="3"
                                        maxlength="50"
                                        pattern="^[a-zA-Z0-9_.-]+$"
                                        title="Aceita letras, números e os caracteres: _ . -"
                                        value="{{username if username else ''}}"
                                    />
                                    <small class="gap 0 pl-0.5 text-on-surface/60 dark:text-on-surface-dark/60 text-xs">
                                        Mín. 3 e Máx. 50 caracteres.
                                    </small>
                                </div>
                                
                                <div class="w-full flex flex-col gap-1 text-on-surface dark:text-on-surface-dark">
                                    <label for="first_name" class="w-fit pl-0.5 text-sm text-on-surface-strong dark:text-on-surface-dark-strong">
                                        Primeiro Nome <span class="text-danger">*</span>
                                    </label>
                                    <input 
                                        id="first_name"
                                        type="text" 
                                        name="first_name" 
                                        class="w-full rounded-radius border px-3 py-2 text-base 
                                               bg-surface-alt dark:bg-surface-dark-alt/50 border-outline dark:border-outline-dark
                                               focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary dark:focus-visible:outline-primary-dark" 
                                        required
                                        minlength="1"
                                        maxlength="120"
                                    />
                                </div>

                                <div class="w-full flex flex-col gap-1 text-on-surface dark:text-on-surface-dark">
                                    <label for="last_name" class="w-fit pl-0.5 text-sm text-on-surface-strong dark:text-on-surface-dark-strong">
                                        Sobrenome <span class="text-danger">*</span>
                                    </label>
                                    <input 
                                        id="last_name"
                                        type="text" 
                                        name="last_name" 
                                        class="w-full rounded-radius border px-3 py-2 text-base 
                                               bg-surface-alt dark:bg-surface-dark-alt/50 border-outline dark:border-outline-dark
                                               focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary dark:focus-visible:outline-primary-dark" 
                                        required
                                        minlength="1"
                                        maxlength="120"
                                    />
                                </div>

                                <div class="w-full flex flex-col gap-1 text-on-surface dark:text-on-surface-dark">
                                    <label for="password" class="w-fit pl-0.5 text-sm text-on-surface-strong dark:text-on-surface-dark-strong">
                                        Senha <span class="text-danger">*</span>
                                    </label>
                                    <input 
                                        id="password"
                                        type="password" 
                                        name="password" 
                                        class="w-full rounded-radius border px-3 py-2 text-base 
                                               bg-surface-alt dark:bg-surface-dark-alt/50 border-outline dark:border-outline-dark
                                               focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary dark:focus-visible:outline-primary-dark" 
                                        required
                                        minlength="8"
                                        maxlength="128"
                                    />
                                    <small class="gap 0 pl-0.5 text-on-surface/60 dark:text-on-surface-dark/60 text-xs">
                                        Mínimo de 8 caracteres.
                                    </small>
                                </div>
                                
                                <div class="flex flex-col pt-6 w-full px-12">
                                    <button type="submit"
                                        class="flex justify-center items-center w-full
                                        gap-2 whitespace-nowrap rounded-radius
                                        bg-primary border border-primary dark:border-primary-dark
                                        px-4 py-3 text-base font-medium tracking-wide text-on-primary
                                        transition-transform hover:opacity-90 text-center
                                        focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary
                                        dark:bg-primary-dark dark:text-on-primary-dark dark:focus-visible:outline-primary-dark">
                                        <i data-lucide="user-plus" class="size-5"></i>
                                            Registrar Usuário
                                    </button>
                                </div>
                                
                            </form>
                            {% endblock register_form %}
                        </div>


                        <footer class="px-6 py-4 flex justify-center
                        border-t border-outline dark:border-outline-dark md:py-6">
                            <a href="/login"
                            class="text-sm text-primary dark:text-primary-dark hover:underline font-medium">
                                Já tem uma conta? Voltar para o Login
                            </a>
                        </footer>
                    </div>
                </div>
            </div>
            {# Fim do card #}
        </div>
    </div>
</div>
{% endblock body %}
