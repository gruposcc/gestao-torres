{% extends "layout/template.html" %}

{% block content %}

<script>
document.addEventListener("alpine:init", () => { 
Alpine.data("newTerrenoForm", () => ({
    map: null,
    marker: null,

    //posição inicial lages

    lat: -27.81525134808175,
    lng: -50.329919457435615,
    zoom_level: 10,

    search_query: '',
    s_addr_txt: '',
    show_results: false,

    init() {
        this.initMap();
    },

    initMap() {
        this.map = L.map('map')
            .setView([this.lat, this.lng], this.zoom_level);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
            .addTo(this.map);

        this.marker = L.marker([this.lat, this.lng], {draggable: true})
            .addTo(this.map);

        // Atualiza o zoom_level sempre que o usuário interagir com o zoom
        this.map.on('zoomend', () => {
            this.zoom_level = this.map.getZoom();
        });


        //evento arrastar marcador
        this.marker.on('dragend', (e) => {
            const {lat, lng} = e.target.getLatLng();
            this.updateFromCoords(lat, lng)
        });

        //evento clicar no mapa
        this.map.on('click', (e) => {
            this.updateFromCoords(e.latlng.lat, e.latlng.lng);
        });
    },
    
    async updateFromCoords(n_lat, n_lng, m=false) {
        const p_lat = parseFloat(n_lat);
        const p_lng = parseFloat(n_lng);

        if (isNaN(p_lat) || isNaN(p_lng)) {
            console.error("erro nas coordenadas");
            return;
        };

        this.lat = p_lat;
        this.lng = p_lng;

        //mover o mapa e o marcador
        if (this.map && this.marker) {
            this.map.setView([this.lat, this.lng], this.zoom_level);
            
            this.marker.setLatLng([this.lat, this.lng]);

            try {
                //geocoding reverso para atualizar o texto 
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${this.lat}&lon=${this.lng}&zoom=${this.zoom_level}&addressdetails=1&extratags=1&accept-language=pt-BR`);

                const data = await response.json();

                //console.log(`geocode reverse response ${data}`);
                const new_addr = data.display_name || `Lat: ${this.lat.toFixed(6)}, Long: ${this.lng.toFixed(6)}`;

                this.s_addr_txt = new_addr;

                //se editar as coordenadas manualmente, atualiza o campo de pesquisa
                //if (manual) {
                //    this.searchQuery = newAddressText;
                //}

            } catch (e) {
                this.s_addr_txt = `Lat: ${this.lat.toFixed(6)}, Lng: ${this.lng.toFixed(6)} (Não foi possível obter o endereço)`;
                console.error("Erro no Geocoding Reverso:", e);
            }
        }
    },

    select_addr(data) {
        this.lat = parseFloat(data.lat);
        this.lng = parseFloat(data.lng);

        this.s_addr_txt = data.selectedAddress;
        this.search_query = data.selectSearchAddress;

        this.map.setView([this.lat, this.lng], this.zoom_level);
        this.marker.setLatLng([this.lat, this.lng]);

    },

}))
}); 
</script>


<div 
    x-data="newTerrenoForm()"
    class="flex flex-row h-full overflow-x-auto {# gap-4 #} p-2"
>

    <!-- Coluna do formulário -->
    <div class="flex flex-col flex-1 gap-4 ">
        <span class="text-xl font-semibold">
            <h2>
                Novo Terreno
            </h2>
        </span>

        {% block form %}

        <form hx-post="/api/terrenos"
            class="space-y-6 px-4 flex flex-col flex-1 gap-4"
        >       

            <div class="flex-row flex flex-1 w-full gap-4">

                <div class="flex flex-1 flex-col gap-1 text-on-surface dark:text-on-surface-dark">
                    <label for="textInputDefault" class="w-fit pl-0.5 text-sm">Latitude</label>
                    <input id="textInputDefault" type="text" class="w-full rounded-radius border border-outline bg-surface-alt px-2 py-2 text-sm focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary disabled:cursor-not-allowed disabled:opacity-75 dark:border-outline-dark dark:bg-surface-dark-alt/50 dark:focus-visible:outline-primary-dark" name="name" placeholder="Enter your name" autocomplete="name"/>
                </div>

                <div class="flex flex-1 flex-col gap-1 text-on-surface dark:text-on-surface-dark">
                    <label for="textInputDefault" class="w-fit pl-0.5 text-sm">Longitude</label>
                    <input id="textInputDefault" type="text" class="w-full rounded-radius border border-outline bg-surface-alt px-2 py-2 text-sm focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary disabled:cursor-not-allowed disabled:opacity-75 dark:border-outline-dark dark:bg-surface-dark-alt/50 dark:focus-visible:outline-primary-dark" name="name" placeholder="Enter your name" autocomplete="name"/>
                </div>

            </div>

            <div class="flex-row flex flex-1 w-full gap-4">

                <div class="flex flex-1 flex-col gap-1 text-on-surface dark:text-on-surface-dark">
                    <label for="textInputDefault" class="w-fit pl-0.5 text-sm">Latitude</label>
                    <input id="textInputDefault" type="text" class="w-full rounded-radius border border-outline bg-surface-alt px-2 py-2 text-sm focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary disabled:cursor-not-allowed disabled:opacity-75 dark:border-outline-dark dark:bg-surface-dark-alt/50 dark:focus-visible:outline-primary-dark" name="name" placeholder="Enter your name" autocomplete="name"/>
                </div>

                <div class="flex flex-1 flex-col gap-1 text-on-surface dark:text-on-surface-dark">
                    <label for="textInputDefault" class="w-fit pl-0.5 text-sm">Longitude</label>
                    <input id="textInputDefault" type="text" class="w-full rounded-radius border border-outline bg-surface-alt px-2 py-2 text-sm focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary disabled:cursor-not-allowed disabled:opacity-75 dark:border-outline-dark dark:bg-surface-dark-alt/50 dark:focus-visible:outline-primary-dark" name="name" placeholder="Enter your name" autocomplete="name"/>
                </div>
                
            </div>

            <div class="flex-row flex flex-1 w-full gap-4">
                <div class="flex flex-1 flex-col gap-1 text-on-surface dark:text-on-surface-dark">
                    <label for="textInputDefault" class="w-fit pl-0.5 text-sm">Latitude</label>
                    <input id="textInputDefault" type="text" class="w-full rounded-radius border border-outline bg-surface-alt px-2 py-2 text-sm focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary disabled:cursor-not-allowed disabled:opacity-75 dark:border-outline-dark dark:bg-surface-dark-alt/50 dark:focus-visible:outline-primary-dark" name="name" placeholder="Enter your name" autocomplete="name"/>
                </div>

                <div class="flex flex-1 flex-col gap-1 text-on-surface dark:text-on-surface-dark">
                    <label for="textInputDefault" class="w-fit pl-0.5 text-sm">Longitude</label>
                    <input id="textInputDefault" type="text" class="w-full rounded-radius border border-outline bg-surface-alt px-2 py-2 text-sm focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary disabled:cursor-not-allowed disabled:opacity-75 dark:border-outline-dark dark:bg-surface-dark-alt/50 dark:focus-visible:outline-primary-dark" name="name" placeholder="Enter your name" autocomplete="name"/>
                </div>
            </div>
            
            <div class=" flex flex-1 w-full gap-4 flex-col">

                <div class="flex w-full max-w-md flex-col gap-1 text-on-surface dark:text-on-surface-dark">
                    <label for="textArea" class="w-fit pl-0.5 text-sm">Comment</label>
                    <textarea id="textArea" class="w-full rounded-radius border border-outline bg-surface-alt px-2.5 py-2 text-sm focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary disabled:cursor-not-allowed disabled:opacity-75 dark:border-outline-dark dark:bg-surface-dark-alt/50 dark:focus-visible:outline-primary-dark" rows="3" placeholder="We'd love to hear from you..."></textarea>
                </div>


                <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700 transition">
                    Salvar Terreno
                </button>
            </div>


        </form>
        {% endblock form %}

    </div> <!--END Coluna Formulário-->

    <!-- Coluna mapa -->
    <div class=" flex-1 flex h-full flex-col"

        x-on:htmx:before-request="show_results = false"
        x-on:htmx:after-swap="show_results = true"

    >

        {# SearchBar COntainer #}
        <div id="pesquisaEndereco"
            class="
                relative 
                text-on-surface dark:text-on-surface-dark
                flex w-full flex-col 
            "
        > 
            {# SearchBar #}
                <input id="pesquisaEnderecoInput" 
                    name="address_query" 
                    type="text"
                    placeholder="Pesquiar endereço" aria-label="pesquisar endereco"

                    x-model="search_query"
                    hx-get="/htmx/address/search" 
                    hx-trigger="keyup changed delay:400ms"
                    hx-swap="innerHTML" 
                    hx-target="#search-results" 
                    
                    @mousedown="
                        if ($refs.searchResults?.children.length > 0) {
                            show_results = true
                        }
                    "

                    class="
                        w-full
                        rounded-radius 
                        border border-outline dark:border-outline-dark
                        bg-surface-alt dark:bg-surface-dark-alt/50
                        py-2 pl-10 pr-2 
                        text-sm
                        focus-visible:outline focus-visible:outline-offset-1
                        focus-visible:outline-dark dark:focus-visible:outline                    
                    " 
                />

                <i data-lucide="search" class="size-5 absolute left-2.5 top-1/2 -translate-y-1/2  text-on-surface/50 dark:text-on-surface-dark/50"></i>
        </div>


        <div class="relative">
        
            {# result container #}
            <div 
                class="absolute px-2 w-full z-1001 top-full flex flex-col "
                style="margin-top: 6px;"
            >
                <ul id="search-results" 
                    @mousedown.away="show_results = false"
                    x-show="show_results"
                    x-ref="searchResults"
                    class=" 
                        bg-surface-alt dark:bg-surface-dark-alt
                        border border-outline dark:border-outline-dark 
                        shadow-2xl
                        rounded-radius
                    "
                >

                </ul>
                
            </div> 
        
        
        </div>

    

        {# map container  #}
        <div class=" flex flex-1 pt-4">
            {# Leafmap  #}
            <div
                id="map"
                class="w-full h-full rounded-radius border"
            ></div>
        </div>

    </div>
</div>


{% endblock content %}
