{% extends "template.html" %}

{% block content %}
    <button 
    hx-get="/user/create" 
    hx-target="#content" 
    hx-swap="innerHTML" 
    href="/user/create"
    hx-push-url="true"
    class="btn btn-accent mt-6">
    Criar User
</button>
<div class="overflow-x-auto my-8">

    <table class="table w-full table-zebra table-hover">
        <thead>
            <tr>
                <th>#</th>
                <th>Nome do Item</th>
                <th>Status</th>
                <th>Valor (R$)</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr class="hover">
                <td>1</td>
                <td>**Projeto Alfa**</td>
                <td><div class="badge badge-success badge-outline">Completo</div></td>
                <td>5.400,00</td>
                <td><button class="btn btn-sm btn-ghost">Detalhes</button></td>
            </tr>
            
            <tr>
                <td>2</td>
                <td>Tarefa Beta</td>
                <td><div class="badge badge-warning">Pendente</div></td>
                <td>850,00</td>
                <td><button class="btn btn-sm btn-ghost">Detalhes</button></td>
            </tr>

            <tr class="hover">
                <td>3</td>
                <td>Bug Fix 33</td>
                <td><div class="badge badge-error badge-outline">Bloqueado</div></td>
                <td>250,00</td>
                <td><button class="btn btn-sm btn-ghost">Detalhes</button></td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th colspan="3">Total de Itens:</th>
                <th>R$ 6.500,00</th>
                <th></th>
            </tr>
        </tfoot>
    </table>
</div>
{% endblock %}
