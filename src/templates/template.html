{% extends "base.html" %}

{% block head %}
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
{% endblock head %}



{% block base_body %}
<div class="drawer lg:drawer-open" x-data="{ isSidebarOpen: true }">
  <input id="my-drawer-4" type="checkbox" class="drawer-toggle" />
  
  <div class="drawer-content flex flex-col min-h-screen">
    
    <nav class="navbar w-full bg-base-300 shadow-lg sticky top-0 z-10">
      
      <label for="my-drawer-4" aria-label="open sidebar" class="btn btn-square btn-ghost lg:hidden">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block w-6 h-6 stroke-current"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
      </label>

      <button x-cloak @click="isSidebarOpen = !isSidebarOpen" class="btn btn-square btn-ghost hidden lg:flex">
         <svg x-bind:class="isSidebarOpen ? 'rotate-180' : ''" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 transition-transform duration-300">
            <path stroke-linecap="round" stroke-linejoin="round" d="M11.25 4.5l7.5 7.5-7.5 7.5" />
         </svg>
      </button>
      
      <div class="flex-1 px-2 mx-2 text-xl font-bold">{{page.title if page else ""}}</div>
      
    </nav>
    
    <main id="content" class="p-8 flex-1">
      {% block content %}
            <h1 class="text-4xl font-bold mb-6">Página Principal</h1>
            <div class="alert alert-info shadow-lg">
                <p>A sidebar agora colapsa em telas grandes!</p>
            </div>
      {% endblock content %}
    </main>
    
  </div>

  {% include "partials/sidebar.html" %}
</div>
{%endblock%}
