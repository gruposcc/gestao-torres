<div x-cloak
    x-data="
        { profileMenuOpen: false, leaveTimeout: null, isClicked: false }
    " 
    class="
        mt-auto pt-2.5 relative
    " 
    x-on:keydown.esc.window="profileMenuOpen = false; isClicked = false"
    x-on:mouseleave.prevent="!isClicked && (leaveTimeout = setTimeout(() => { profileMenuOpen = false }, 300))"
    x-on:mouseenter="leaveTimeout ? clearTimeout(leaveTimeout) : true"
>
    <button
        class="
            mt-auto
            flex items-center
            rounded-radius 

            align-center
            text-sm font-medium
            h-10
            text-on-surface dark:text-on-surface-dark
            underline-offset-2
            focus-visible:underline focus:outline-hidden
            dark:hover:bg-primary-dark/5 hover:bg-primary/5
            dark:hover:text-on-surface-dark-strong hover:text-on-surface-strong 
            overflow-hidden 
            max-w-full
            cursor-pointer
            "
        :class="
            {'justify-center w-10': !$store.sidebar.isSidebarOpen, 'justify-start w-full pl-2.5': $store.sidebar.isSidebarOpen}
        "
        x-on:mouseover="profileMenuOpen = true"
        x-on:click="profileMenuOpen = true; isClicked = !isClicked; $event.stopPropagation()"
    >
        <i data-lucide="circle-user-round" class="size-5 shrink-0"></i>
        <span x-cloak
            class="
                whitespace-nowrap
                transition-opacity 
                duration-300
                ease-in-out

            "
            :class="{ 
                'opacity-100 w-auto pl-2': $store.sidebar.isSidebarOpen, 
                'opacity-0 w-0 overflow-hidden': !$store.sidebar.isSidebarOpen 
            }"
        >
            {{user.name}}
        </span>
    </button>

    <!-- Dropdown Menu -->
    <div x-cloak
        x-show="profileMenuOpen"
        x-transition
        x-on:click.outside="profileMenuOpen = false; isClicked = false"
        class=" absolute
        bottom-full
        flex w-fit
        min-w-48 
        flex-col 
        overflow-hidden 
        rounded-radius
        border border-outline
        bg-surface-alt dark:border-outline-dark
        dark:bg-surface-dark-alt" 
        role="menu"
    >

        <button
            @click="$store.theme.toggle()"
            type="button"
            class="
                flex justify-between items-center
                bg-surface-alt px-4 py-2 text-sm text-on-surface
                hover:bg-surface-dark-alt/5 hover:text-on-surface-strong
                focus-visible:bg-surface-dark-alt/10 focus-visible:text-on-surface-strong focus-visible:outline-hidden
                dark:bg-surface-dark-alt dark:text-on-surface-dark
                dark:hover:bg-surface-alt/5 dark:hover:text-on-surface-dark-strong
                dark:focus-visible:bg-surface-alt/10 dark:focus-visible:text-on-surface-dark-strong
                "
            role="menuitem"
        >
            <span x-text="$store.theme.darkMode ? 'Modo Claro' : 'Modo Escuro'"></span>
            
            <div class="relative w-5 h-5 ml-4">
                <i 
                    data-lucide="sun" 
                    class="size-5 absolute inset-0 m-auto"
                    x-show="!$store.theme.darkMode" aria-label="Switch to Dark Mode"
                    x-transition:enter="transition ease-out duration-300"
                    x-transition:enter-start="transform opacity-0 scale-0 rotate-180"
                    x-transition:enter-end="transform opacity-100 scale-100 rotate-0"
                    x-transition:leave="transition ease-in duration-300"
                    x-transition:leave-start="transform opacity-100 scale-100 rotate-0"
                    x-transition:leave-end="transform opacity-0 scale-0 rotate-180"
                ></i>
                <i 
                    data-lucide="moon" 
                    class="size-5 absolute inset-0 m-auto"
                    x-show="$store.theme.darkMode" aria-label="Switch to Light Mode"
                    x-transition:enter="transition ease-out duration-300"
                    x-transition:enter-start="transform opacity-0 scale-0 rotate-180"
                    x-transition:enter-end="transform opacity-100 scale-100 rotate-0"
                    x-transition:leave="transition ease-in duration-300"
                    x-transition:leave-start="transform opacity-100 scale-100 rotate-0"
                    x-transition:leave-end="transform opacity-0 scale-0 rotate-180"
                ></i>
            </div>
        </button>
        <button
            hx-post="/logout"
            type="button"
            class="
                flex justify-between items-center
                bg-surface-alt px-4 py-2 text-sm text-on-surface
                hover:bg-surface-dark-alt/5 hover:text-on-surface-strong
                focus-visible:bg-surface-dark-alt/10 focus-visible:text-on-surface-strong focus-visible:outline-hidden
                dark:bg-surface-dark-alt dark:text-on-surface-dark
                dark:hover:bg-surface-alt/5 dark:hover:text-on-surface-dark-strong
                dark:focus-visible:bg-surface-alt/10 dark:focus-visible:text-on-surface-dark-strong
                "
            role="menuitem"
        >
            <span>Logout</span>
            
            <div class="relative w-5 h-5 ml-4">
                <i 
                    data-lucide="log-out" 
                    class="size-5 absolute inset-0 m-auto"
                    aria-label="Switch to Dark Mode"
                ></i>
            </div>
        </button>




            <a href="#" class="bg-surface-alt px-4 py-2 text-sm text-on-surface hover:bg-surface-dark-alt/5 hover:text-on-surface-strong focus-visible:bg-surface-dark-alt/10 focus-visible:text-on-surface-strong focus-visible:outline-hidden dark:bg-surface-dark-alt dark:text-on-surface-dark dark:hover:bg-surface-alt/5 dark:hover:text-on-surface-dark-strong dark:focus-visible:bg-surface-alt/10 dark:focus-visible:text-on-surface-dark-strong" role="menuitem">Settings</a>
            <a href="#" class="bg-surface-alt px-4 py-2 text-sm text-on-surface hover:bg-surface-dark-alt/5 hover:text-on-surface-strong focus-visible:bg-surface-dark-alt/10 focus-visible:text-on-surface-strong focus-visible:outline-hidden dark:bg-surface-dark-alt dark:text-on-surface-dark dark:hover:bg-surface-alt/5 dark:hover:text-on-surface-dark-strong dark:focus-visible:bg-surface-alt/10 dark:focus-visible:text-on-surface-dark-strong" role="menuitem">Sign Out</a>
    </div>


</div>
