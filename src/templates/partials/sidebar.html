<nav
    id="nav-sidebar"
    class="sidebar fixed md:relative z-50 h-full transition-all duration-300 ease-in-out bg-surface-alt shadow-xl md:shadow-none"
    :class="{
        'open translate-x-0': $store.sidebar.isSidebarOpen,
        'close -translate-x-full md:translate-x-0': !$store.sidebar.isSidebarOpen
    }"
    :style="window.innerWidth >= 768 ? 'position: relative !important; transform: none !important;' : ''"
    x-init="document.documentElement.classList.remove('sidebar-expanded')"
    x-data="{ openMenus: [] }"
>
    <!-- Container interno -->
    <div
        id="sidebar-items-container"
        class="sidebar-container h-full border-r border-outline md:border-none transition-all duration-300"
    >
        {# HOME #}
        <a
            hx-get="/home"
            hx-target="#content"
            hx-swap="innerHTML"
            hx-push-url="true"
            href="/home"
            class="sidebar-item"
            :class="{ 'active' : $store.sidebar.currentPath === '/home' }"
        >
            <div>
                <i data-lucide="house"></i>
                <span
                    x-cloak
                    :class="{ 'open': $store.sidebar.isSidebarOpen, 'close': !$store.sidebar.isSidebarOpen }"
                >
                Home
                </span>
            </div>
        </a>

        {# Torres #}
        <a
            hx-get="/torre/list"
