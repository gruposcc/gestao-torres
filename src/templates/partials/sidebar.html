<!-- This allows screen readers to skip the sidebar and go directly to the main content. -->
<a class="sr-only" href="#content">skip to the main content</a>
    
<!-- dark overlay for when the sidebar is open on smaller screens  -->
{# <div class="fixed inset-0 z-10 bg-surface-dark/10 backdrop-blur-xs md:hidden" aria-hidden="true" x-on:click="showSidebar = false" x-transition.opacity></div> #}

<nav 
    id="nav-sidebar"
    class="
        fixed left-0 z-10
        flex shrink-0 flex-col
        bg-surface-alt dark:bg-surface-dark-alt
        px-2.5 w-15
        in-[.sidebar-expanded]:w-60
        transition-transform
        duration-300  ease-in-out 
        md:translate-x-0 md:relative
    " 
    :class=" {# SIDEBAR W TOGGLE #}
        { 'w-60': $store.sidebar.isSidebarOpen, 'w-15' : !$store.sidebar.isSidebarOpen}
    "
    x-init="document.documentElement.classList.remove('sidebar-expanded')"
    aria-label="sidebar navigation"
>
    <!-- sidebar links  -->
    <div 
        id="sidebar-items-container"
        class="flex flex-col gap-1 items-center ">

        <!--home-->
        <a 
            hx-get="/home"
            hx-target="#content"
            hx-swap="innerHTML"
            hx-push-url="true"
            href="/home"
            class="
                sidebar-item 

                transition-transform duration-300  ease-out 
                flex items-center
                rounded-radius 
                text-sm font-medium
                h-10 w-full pl-2.5
 
                text-on-surface dark:text-on-surface-dark dark:hover:text-on-surface-dark-strong hover:text-on-surface-strong 
                {# underline-offset-2 #}
    
                focus-visible:underline focus:outline-hidden
                dark:hover:bg-primary-dark/20 hover:bg-primary/5

            "
            :class="{
                'w-10': !$store.sidebar.isSidebarOpen,
                'w-full': $store.sidebar.isSidebarOpen,
                '!text-primary dark:!text-primary-dark !bg-primary/10 dark:!bg-primary-dark/10': $store.sidebar.currentPath === '/home'
            }"
        >

        <i data-lucide="house" class="size-5 shrink-0 transition-none"></i>
        <span x-cloak
            class="
                whitespace-nowrap
                transition-all 
                duration-300
                {# ease-in-out #}
            "
            :class="{ 
                'opacity-100 w-auto pl-2': $store.sidebar.isSidebarOpen, 
                'opacity-0 w-0 overflow-hidden': !$store.sidebar.isSidebarOpen 
            }"
        >
            Home
        </span>
        </a>

        <!-- user -->
        <a 
            hx-get="/user" 
            hx-target="#content"
            hx-swap="innerHTML"
            hx-push-url="true"
            href="/user" 
            class="
                flex items-center
                rounded-radius 

                align-center
                text-sm font-medium
                h-10
                text-on-surface dark:text-on-surface-dark
                underline-offset-2
                focus-visible:underline focus:outline-hidden
                dark:hover:bg-primary-dark/5 hover:bg-primary/5
                dark:hover:text-on-surface-dark-strong hover:text-on-surface-strong 


                "
            :class="{
                'justify-center w-10': !$store.sidebar.isSidebarOpen,
                'justify-start w-full pl-2.5': $store.sidebar.isSidebarOpen,
                '!text-primary dark:!text-primary-dark !bg-primary/10 dark:!bg-primary-dark/10': $store.sidebar.currentPath.startsWith('/user')
            }"
        >
            <i data-lucide="users-round" class="size-5 shrink-0"></i>
            <span x-cloak
                class="
                    whitespace-nowrap
                    transition-opacity 
                    duration-300
                    ease-in-out
                "
                :class="{ 
                    'opacity-100 w-auto pl-2': $store.sidebar.isSidebarOpen, 
                    'opacity-0 w-0 overflow-hidden': !$store.sidebar.isSidebarOpen 
                }"
            >
                Usuários
            </span>
        </a>

        <!-- terreno -->
        <a 
            hx-get="/terreno" 
            hx-target="#content"
            hx-swap="innerHTML"
            hx-push-url="true"
            href="/terreno" 
            class="
                flex items-center
                rounded-radius 
                align-center
                text-sm font-medium
                h-10
                text-on-surface dark:text-on-surface-dark
                underline-offset-2
                focus-visible:underline focus:outline-hidden
                dark:hover:bg-primary-dark/5 hover:bg-primary/5
                dark:hover:text-on-surface-dark-strong hover:text-on-surface-strong 
                "
            :class="{
                'justify-center w-10': !$store.sidebar.isSidebarOpen,
                'justify-start w-full pl-2.5': $store.sidebar.isSidebarOpen,
                '!text-primary dark:!text-primary-dark !bg-primary/10 dark:!bg-primary-dark/10': $store.sidebar.currentPath.startsWith('/terreno')
            }"
        >
            <i data-lucide="land-plot" class="size-5 shrink-0"></i>
            <span x-cloak
                class="
                    whitespace-nowrap
                    transition-opacity 
                    duration-300
                    ease-in-out
                "
                :class="{ 
                    'opacity-100 w-auto pl-2': $store.sidebar.isSidebarOpen, 
                    'opacity-0 w-0 overflow-hidden': !$store.sidebar.isSidebarOpen 
                }"
            >
                Terrenos
            </span>
        </a>




  </div>
